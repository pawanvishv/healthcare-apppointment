spring:
  datasource:
    url: jdbc:h2:file:/data/appointments;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

logging:
  level:
    com.healthapp.backend: INFO
    root: WARN

app:
  kafka:
    enabled: ${KAFKA_ENABLED:true}
